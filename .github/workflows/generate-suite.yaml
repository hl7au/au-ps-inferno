name: Generate Suite
on:
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup environment
        run: make setup
      - name: Sync IGs and generate suites
        run: make sync_and_generate
      - name: Run tests
        run: make tests
      - name: Change ownership
        run: sudo chown -R $USER:$USER .
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          delete-branch: true
          branch: automated/generate-suite
          commit-message: "Sync IGs and generate suites"
          title: "Sync IGs and generate suites"
          body: >
            Automated IG sync and suite generation (workflow run #${{ github.run_number }}:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).
          labels: automated-pr
          base: master
