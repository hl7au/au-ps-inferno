name: Run Script
on:
  workflow_dispatch:
    inputs:
      script:
        description: Script to run
        required: true
        type: choice
        options:
          - rename.rb
      issue_number:
        description: Related issue number (optional, digits only)
        required: false
        type: string
permissions:
  contents: write
  pull-requests: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3.6'
        bundler-cache: true
    - name: Run script
      run: ruby scripts/${{ inputs.script }}
    - name: Prepare PR metadata
      shell: bash
      env:
        SCRIPT: ${{ inputs.script }}
        ISSUE_NUMBER: ${{ inputs.issue_number }}
      run: |
        if [ -n "$ISSUE_NUMBER" ] && ! [[ "$ISSUE_NUMBER" =~ ^[0-9]+$ ]]; then
          echo "issue_number must contain digits only, got: $ISSUE_NUMBER" >&2
          exit 1
        fi

        DATE=$(date -u +%Y-%m-%d)
        SUFFIX=""
        REF_LINE=""
        if [ -n "$ISSUE_NUMBER" ]; then
          SUFFIX=" (#${ISSUE_NUMBER})"
          REF_LINE=$'\n\n'"Closes #${ISSUE_NUMBER}"
        fi

        {
          echo "PR_TITLE=Run ${SCRIPT} - ${DATE} #${GITHUB_RUN_NUMBER}${SUFFIX}"
          echo "PR_BODY<<EOF"
          echo "Automated run of scripts/${SCRIPT} from workflow run #${GITHUB_RUN_NUMBER}: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}${REF_LINE}"
          echo "EOF"
        } >> "$GITHUB_ENV"
    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        delete-branch: true
        branch: automated/run-script-${{ github.run_id }}
        commit-message: ${{ env.PR_TITLE }}
        title: ${{ env.PR_TITLE }}
        body: ${{ env.PR_BODY }}
        labels: automated-pr
        base: master
