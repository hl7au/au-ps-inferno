name: Sync IGs
on:
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Pull images
        run: make pull
      - name: Sync IGs
        run: make sync_igs
      - name: Change ownership
        run: sudo chown -R $USER:$USER .
      - name: Check for new archives
        id: changes
        shell: bash
        run: |
          if git status --porcelain -- lib/au_ps_inferno/igs | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No new IG archives found."
          fi
      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          delete-branch: true
          branch: automated/sync-igs
          commit-message: "Sync IG archives from registries"
          title: "Sync IG archives"
          body: >
            Automated IG sync (workflow run #${{ github.run_number }}:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).


            Merging this PR pushes the new archive(s) to `master`, which automatically
            triggers the [Generate Suite workflow](https://github.com/${{ github.repository }}/actions/workflows/generate-suite.yaml)
            to generate a test suite for each new IG version.
          labels: automated-pr
          base: master
