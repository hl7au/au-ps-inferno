AllCops:
  NewCops: enable
  Exclude:
    - "lib/au_ps_inferno/suite/**/*"
    - "lib/au_ps_inferno/generated/**/*"
    - "spec/integration/suite_100ballot_snapshots_spec.rb"
    - "lib/au_ps_inferno/generator/primitive_test.rb"
    - "lib/au_ps_inferno/generator/generator.rb"
    - "lib/au_ps_inferno/generator/suite_file_generator.rb"
    - "lib/au_ps_inferno/generator/suite_spec.rb"

Gemspec/DevelopmentDependencies:
  Enabled: false

Naming/MethodName:
  Exclude:
    - "lib/au_ps_inferno/generator/generator.rb"

Metrics/MethodLength:
  Exclude:
    - "lib/au_ps_inferno/utils/basic_test/composition_section_check_resources_ms_elements_module.rb"

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"

Layout/LineLength:
  Exclude:
    - "lib/au_ps_inferno/generator/suite_structure/definitions.rb"
